<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moodboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@600;700&family=Caveat:wght@500;700&family=IBM+Plex+Mono:wght@500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.03), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(255,255,255,0.03), transparent 40%),
      #201526;
    font-family: 'IBM Plex Mono', monospace;
    padding: 16px 10px 60px;
  }
  .board { max-width: 950px; margin: 0 auto; column-count: 2; column-gap: 8px; position: relative; }
  @media (min-width: 640px) { .board { column-count: 3; } }
  @media (min-width: 900px) { .board { column-count: 4; } }
  .piece { break-inside: avoid; margin-bottom: 8px; position: relative; }
  .tight { margin-top: -20px; } .tight2 { margin-top: -30px; }

  /* sticker outline hack: hugs the shape's own alpha silhouette, not a bounding box */
  .stk {
    filter:
      drop-shadow(1.5px 0 0 var(--oc,#F4EFE6)) drop-shadow(-1.5px 0 0 var(--oc,#F4EFE6))
      drop-shadow(0 1.5px 0 var(--oc,#F4EFE6)) drop-shadow(0 -1.5px 0 var(--oc,#F4EFE6))
      drop-shadow(1.2px 1.2px 0 var(--oc,#F4EFE6)) drop-shadow(-1.2px -1.2px 0 var(--oc,#F4EFE6))
      drop-shadow(0 6px 10px rgba(0,0,0,0.5));
  }
  .stk svg { width: 100%; height: 100%; display:block; }

  /* rectangular fabric/texture stickers: colored outline instead of white card */
  .rect-stk { border-radius: 6px; box-shadow: 0 0 0 3px var(--oc,#F4EFE6), 0 6px 14px rgba(0,0,0,0.5); }
  .h50{height:50px;} .h60 { height: 60px; } .h80 { height: 80px; } .h100 { height: 100px; } .h130 { height: 130px; } .h150 { height: 150px; } .h170{height:170px;}

  .split2, .split3 { display:flex; border-radius: 6px; overflow:hidden; box-shadow: 0 0 0 3px var(--oc,#F4EFE6), 0 6px 14px rgba(0,0,0,0.5); }
  .split2 > div, .split3 > div { flex:1; }

  .title-card {
    background: #F4EFE6; border-radius: 4px; padding: 14px 12px 16px;
    transform: rotate(-2deg); box-shadow: 0 6px 16px rgba(0,0,0,0.4);
  }
  .title-card h1 { font-family: 'Zilla Slab', serif; font-size: 19px; color: #4A1E3D; line-height: 1.15; }
  .title-card .rule { font-family: 'Caveat', cursive; font-size: 15px; color: #C4642F; margin-top: 4px; }

  .r1 { transform: rotate(-3deg); } .r2 { transform: rotate(2deg); } .r3 { transform: rotate(-1.5deg); }
  .r4 { transform: rotate(3deg); } .r5 { transform: rotate(-2.5deg); } .r6 { transform: rotate(1.5deg); }
  .r7 { transform: rotate(4deg); } .r8 { transform: rotate(-4deg); } .r9{transform:rotate(-6deg);} .r10{transform:rotate(6deg);}

  .word-tape {
    display:inline-block; background: #F4EFE6; color:#2B1E33; font-family:'Caveat',cursive; font-size:17px;
    padding: 6px 11px; border-radius: 3px; box-shadow: 0 6px 14px rgba(0,0,0,0.4);
  }
  .marquee {
    display:inline-block; padding:8px 14px; border-radius: 20px; font-family:'IBM Plex Mono',monospace; font-size:12px;
    letter-spacing:1px; color:#201526; font-weight:600;
    background: linear-gradient(90deg,#D6408A,#C9A227,#4FA8A0,#D6408A);
    box-shadow: 0 6px 14px rgba(0,0,0,0.5);
  }
  .btn3d { border-radius: 50%; box-shadow: inset 0 3px 6px rgba(255,255,255,0.55), inset 0 -4px 8px rgba(0,0,0,0.35), 0 6px 12px rgba(0,0,0,0.45); }
  .holo { border-radius: 6px; box-shadow: 0 0 0 3px #F4EFE6, 0 6px 14px rgba(0,0,0,0.5); background: linear-gradient(120deg,#8E1B3F,#C9A227,#1E6B52,#1B3F73,#D6408A); background-size:220% 220%; }

  .float { position: absolute; z-index: 20; pointer-events:none; }
  .pixel-corner { position:absolute; width:14px; height:14px; }
</style>
</head>
